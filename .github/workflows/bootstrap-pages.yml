name: Verify and deploy controlled preview

on:
  push:
    branches: [main]
    paths-ignore:
      - DEPLOYMENT_STATUS.md
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify public allowlist and manifest hashes
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('.')
          expected = {
              '.nojekyll',
              'index.html',
              'feedback.html',
              'players/yoane-wissa.html',
              'site-manifest.json',
          }
          for relative in expected:
              assert (root / relative).is_file(), relative

          manifest = json.loads((root / 'site-manifest.json').read_text())
          assert manifest['manifest_id'] == 'PB-GOLDEN-891aeb7c0113c103'
          assert manifest['canonical_record_digest'] == '94635b0743ffd7267c436e268aedab3ff1d934bd8d3ba7f9cb55ca4ed8659638'
          assert manifest['public_release_eligible'] is False
          for entry in manifest['files']:
              path = root / entry['path']
              assert path.is_file(), entry['path']
              assert path.stat().st_size == entry['bytes'], entry['path']
              assert hashlib.sha256(path.read_bytes()).hexdigest() == entry['sha256'], entry['path']
          PY
          grep -q 'players/yoane-wissa.html' index.html
          grep -q '../index.html' players/yoane-wissa.html
          grep -q 'id="copy-feedback"' feedback.html

      - name: Stage Pages artifact from allowlist only
        run: |
          rm -rf public
          mkdir -p public/players
          cp index.html feedback.html site-manifest.json .nojekyll public/
          cp players/yoane-wissa.html public/players/
          test "$(find public -type f | wc -l)" -eq 5

      - name: Ensure GitHub Pages site exists
        id: enable_pages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          get_status=$(curl -sS -o /tmp/pages-get.json -w '%{http_code}' "${headers[@]}" "$api")
          echo "get_status=${get_status}" >> "$GITHUB_OUTPUT"
          if [ "$get_status" = "200" ]; then
            echo "create_status=not-needed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$get_status" != "404" ]; then
            cat /tmp/pages-get.json
            echo "create_status=not-attempted" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          create_status=$(curl -sS -o /tmp/pages-create.json -w '%{http_code}' \
            -X POST "${headers[@]}" \
            -d '{"build_type":"workflow"}' \
            "$api")
          echo "create_status=${create_status}" >> "$GITHUB_OUTPUT"
          cat /tmp/pages-create.json || true
          test "$create_status" = "201"

      - name: Configure Pages metadata
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        id: upload
        continue-on-error: true
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Persist deployment outcome
        if: always()
        env:
          ENABLE_OUTCOME: ${{ steps.enable_pages.outcome }}
          PAGES_GET_STATUS: ${{ steps.enable_pages.outputs.get_status }}
          PAGES_CREATE_STATUS: ${{ steps.enable_pages.outputs.create_status }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          page_url="${PAGE_URL:-unavailable}"
          cat > DEPLOYMENT_STATUS.md <<EOF
          # PB-03D Public Preview Deployment

          - Enable Pages API step: ${ENABLE_OUTCOME}
          - Pages GET HTTP status: ${PAGES_GET_STATUS:-unavailable}
          - Pages CREATE HTTP status: ${PAGES_CREATE_STATUS:-unavailable}
          - Configure Pages: ${CONFIGURE_OUTCOME}
          - Upload Pages artifact: ${UPLOAD_OUTCOME}
          - Deploy Pages: ${DEPLOY_OUTCOME}
          - Preview URL: ${page_url}
          - Workflow source commit: ${GITHUB_SHA}
          - Manifest ID: PB-GOLDEN-891aeb7c0113c103
          - Canonical digest: 94635b0743ffd7267c436e268aedab3ff1d934bd8d3ba7f9cb55ca4ed8659638
          - Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Recorded at UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          EOF
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add DEPLOYMENT_STATUS.md
          git commit -m 'docs: record PB-03D Pages deployment outcome'
          git push

      - name: Enforce successful deployment
        if: steps.deployment.outcome != 'success'
        run: exit 1
